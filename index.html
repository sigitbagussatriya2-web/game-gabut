<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB_ESP | Cheat Mode v1.0</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); /* Efek cermin */ }
        #status-bar { position: fixed; top: 10px; left: 10px; padding: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ff00; z-index: 100; font-size: 14px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-models/coco-ssd"></script>
</head>
<body>

<div id="status-bar">
    [ SYSTEM ] ESP MODE: ACTIVE<br>
    [ STATUS ] MODEL: LOADING...<br>
    [ RADAR  ] TRACKING...
</div>

<div class="container">
    <video id="webcam" width="640" height="480" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    let model;

    // --- Konfigurasi Estetika ---
    const ESP_COLOR_ENEMY = 'rgb(255, 0, 0)'; // Merah untuk 'musuh' (manusia)
    const ESP_COLOR_INFO = 'rgb(255, 255, 255)'; // Putih untuk teks
    const FONT_SETTINGS = '16px "Courier New"';

    // --- Konfigurasi Jarak ---
    // Kalibrasi: Ukur tinggi piksel seseorang pada jarak 1 meter (misalnya, 200px)
    const KNOWN_HEIGHT_CM = 170; // Tinggi rata-rata manusia
    const FOCAL_LENGTH = 500; // Panjang fokus yang dikalibrasi (piksel pada 1m)

    // 1. Setup Kamera
    async function setupWebcam() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Peramban ini tidak mendukung akses kamera.');
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480 }, 
                audio: false 
            });
            video.srcObject = stream;
            return new Promise((resolve) => video.onloadedmetadata = () => resolve());
        } catch (e) {
            console.error('Akses kamera ditolak:', e);
            statusBar.innerHTML = '[ ERR ] Kamera Gagal Diaktifkan';
        }
    }

    // 2. Loop Deteksi & Gambar
    async function detectFrame() {
        if (!model) return;

        const predictions = await model.detect(video);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Bersihkan canvas

        predictions.forEach((prediction, index) => {
            // Hanya targetkan "person"
            if (prediction.class === 'person') {
                // prediction.bbox mengembalikan [x, y, width, height]
                const [x, y, width, height] = prediction.bbox;

                // Hitung estimasi jarak
                const distanceInCm = (KNOWN_HEIGHT_CM * FOCAL_LENGTH) / height;
                const distanceInMeters = (distanceInCm / 100).toFixed(2);

                // --- Gambar Tampilan ESP ---
                ctx.strokeStyle = ESP_COLOR_ENEMY;
                ctx.lineWidth = 2;
                // Balikkan koordinat x untuk efek cermin
                const flippedX = canvas.width - (x + width);

                // Kotak Utama
                ctx.strokeRect(flippedX, y, width, height);

                // Gaya Kotak Tambahan (Pojok)
                const cornerSize = 15;
                ctx.beginPath();
                // Kiri Atas
                ctx.moveTo(flippedX, y + cornerSize); ctx.lineTo(flippedX, y); ctx.lineTo(flippedX + cornerSize, y);
                // Kanan Atas
                ctx.moveTo(flippedX + width - cornerSize, y); ctx.lineTo(flippedX + width, y); ctx.lineTo(flippedX + width, y + cornerSize);
                // Kiri Bawah
                ctx.moveTo(flippedX, y + height - cornerSize); ctx.lineTo(flippedX, y + height); ctx.lineTo(flippedX + cornerSize, y + height);
                // Kanan Bawah
                ctx.moveTo(flippedX + width - cornerSize, y + height); ctx.lineTo(flippedX + width, y + height); ctx.lineTo(flippedX + width, y + height - cornerSize);
                ctx.stroke();

                // --- Teks Info Gaya 'Cheat' ---
                ctx.font = FONT_SETTINGS;
                
                // Balikkan koordinat teks kembali ke normal (non-cermin)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.fillStyle = ESP_COLOR_INFO;
                const textYOffset = y - 10;
                ctx.fillText(`TARGET: P${index+1} [EST_DST: ${distanceInMeters}M]`, -(flippedX + width), textYOffset);
                ctx.restore();
            }
        });

        // Request frame berikutnya
        requestAnimationFrame(detectFrame);
    }

    // 3. Main Init
    async function init() {
        console.log("Loading AI model...");
        try {
            model = await cocoSsd.load();
            console.log("Model Loaded!");
            statusBar.innerHTML = '[ SYSTEM ] ESP MODE: ACTIVE<br>[ STATUS ] MODEL: LOADED<br>[ RADAR  ] TRACKING...';
            await setupWebcam();
            detectFrame();
        } catch (e) {
            console.error('Gagal memuat model:', e);
            statusBar.innerHTML = '[ ERR ] Model Gagal Dimuat';
        }
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP FPS Engine - Neon Mod Menu Edition</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        /* Crosshair Tengah Layar */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; background: #00ff00;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }

        /* Layar Utama Klik Start */
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.9); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            z-index: 20; cursor: pointer;
        }
        #start-btn {
            padding: 12px 28px; background: #ff0055; color: white; 
            border: none; border-radius: 6px; font-weight: bold; 
            font-size: 16px; margin-top: 15px; cursor: pointer;
            box-shadow: 0 0 10px #ff0055;
        }

        /* HUD Skor Kiri Bawah */
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(5, 5, 10, 0.75);
            padding: 12px 18px; border-radius: 8px; pointer-events: none; z-index: 15;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ---------- ANIMASI LAMPU NEON WARNA WARNI (RGB WAVE) ---------- */
        @keyframes neonRGB {
            0% { color: #ff0055; text-shadow: 0 0 5px #ff0055, 0 0 15px #ff0055; }
            33% { color: #00ff00; text-shadow: 0 0 5px #00ff00, 0 0 15px #00ff00; }
            66% { color: #00ffff; text-shadow: 0 0 5px #00ffff, 0 0 15px #00ffff; }
            100% { color: #ff0055; text-shadow: 0 0 5px #ff0055, 0 0 15px #ff0055; }
        }

        /* ---------- GUI MOD MENU (KIRI ATAS) ---------- */
        #mod-menu {
            position: absolute; top: 15px; left: 15px;
            width: 190px; background: rgba(10, 10, 15, 0.95);
            border: 2px solid #ff0055; border-radius: 8px;
            color: white; padding: 12px; z-index: 30;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
        .neon-logo {
            margin: 0 0 5px 0; text-align: center; 
            font-size: 22px; font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 3px; animation: neonRGB 4s infinite linear;
        }
        .menu-item { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .menu-item select, .menu-item button { 
            background: #111; color: #fff; border: 1px solid #ff0055; 
            padding: 3px 6px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .status-on { color: #00ff00 !important; border-color: #00ff00 !important; }
        .status-off { color: #ff3333 !important; border-color: #ff3333 !important; }

        /* ESP Box Overlay 2D */
        #esp-box { position: absolute; border: 2px solid #00ffff; display: none; pointer-events: none; z-index: 5; box-shadow: 0 0 8px #00ffff; }

        /* ---------- KONTROL HUD HP (MOBILE ONLY) ---------- */
        .mobile-btn {
            position: absolute; width: 65px; height: 65px;
            background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%; color: white; display: none;
            justify-content: center; align-items: center;
            font-weight: bold; font-size: 11px; z-index: 15; touch-action: none;
        }
        .mobile-btn:active { background: rgba(255, 255, 255, 0.4); border-color: #00ff00; }
        
        #btn-shoot { right: 30px; bottom: 115px; width: 80px; height: 80px; background: rgba(255, 50, 50, 0.3); border-color: #ff3333; font-size: 13px; }
        #btn-scope { right: 130px; bottom: 125px; }
        #btn-jump { right: 40px; bottom: 30px; }
        #btn-crouch { right: 130px; bottom: 30px; }

        /* Virtual Joystick (Analog Kiri HP) */
        #joystick-zone {
            position: absolute; left: 40px; bottom: 40px;
            width: 110px; height: 110px; background: rgba(255,255,255,0.08);
            border-radius: 50%; display: none; z-index: 15; border: 1px solid rgba(255,255,255,0.2);
        }
        #joystick-stick {
            position: absolute; top: 40px; left: 40px;
            width: 30px; height: 30px; background: rgba(255,255,255,0.7); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="esp-box"></div>
    
    <div id="instructions">
        <h1 style="font-size: 36px; color: #ff0055; margin: 0;">MOBILE & PC AIM LAB</h1>
        <p style="color: #aaa; max-width: 400px; font-size: 14px; margin: 10px 0;">
            <b>PC:</b> WASD untuk Jalan, Geser Mouse untuk Bidik, Klik Kiri Tembak, Tahan Klik Kanan Aimbot.<br><br>
            <b>HP:</b> Analog Kiri Jalan, Geser Layar Kanan untuk Bidik, Gunakan Tombol HUD Layar.
        </p>
        <button id="start-btn">MASUK GAME</button>
    </div>

    <div id="mod-menu">
        <div class="neon-logo">MOD v2.0</div>
        <hr style="border:0; border-top: 1px dashed rgba(255,255,255,0.15); margin-bottom: 10px;">
        <div class="menu-item">
            <span>Aimbot Lock:</span>
            <select id="aim-target-select"><option value="HEAD">HEAD</option><option value="BODY">BODY</option></select>
        </div>
        <div class="menu-item"><span>ESP Box:</span><button id="btn-esp" class="status-off">OFF</button></div>
        <div class="menu-item"><span>Magic Bullet:</span><button id="btn-magic" class="status-off">OFF</button></div>
    </div>

    <div id="hud">
        Skor: <span id="score" style="color:#00ff00; font-weight:bold;">0</span><br>
        Jarak: <span id="distance">0</span>m
    </div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div id="btn-shoot" class="mobile-btn">TEMBAK</div>
    <div id="btn-scope" class="mobile-btn">SCOPE</div>
    <div id="btn-jump" class="mobile-btn">LOMPAT</div>
    <div id="btn-crouch" class="mobile-btn">JONGKOK</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, enemy, obstacleWall;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0, score = 0;
        let playerHeight = 2.0;

        // States
        let isScoped = false, isCrouching = false;
        let cheatConfig = { aimTarget: "HEAD", espActive: false, magicBullet: false, aimbotPressed: false };

        // Physics (Lompat & Gravitasi)
        let verticalVelocity = 0, isGrounded = true;

        // Mobile Look Touches
        let touchLookId = null, lastTouchX = 0, lastTouchY = 0;

        // Aktifkan Fitur Mobile jika Terdeteksi Layar Sentuh
        function detectDevice() {
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.querySelectorAll('.mobile-btn').forEach(b => b.style.display = 'flex');
                document.getElementById('joystick-zone').style.display = 'block';
            }
        }

        // Mod Menu Controller
        document.getElementById('aim-target-select').addEventListener('change', (e) => cheatConfig.aimTarget = e.target.value);
        
        document.getElementById('btn-esp').addEventListener('click', (e) => {
            cheatConfig.espActive = !cheatConfig.espActive;
            e.target.innerText = cheatConfig.espActive ? "ON" : "OFF";
            e.target.className = cheatConfig.espActive ? "status-on" : "status-off";
        });
        
        document.getElementById('btn-magic').addEventListener('click', (e) => {
            cheatConfig.magicBullet = !cheatConfig.magicBullet;
            e.target.innerText = cheatConfig.magicBullet ? "ON" : "OFF";
            e.target.className = cheatConfig.magicBullet ? "status-on" : "status-off";
        });

        // Trigger Start Game
        instructions.addEventListener('click', () => {
            if (!('ontouchstart' in window)) document.body.requestPointerLock();
            instructions.style.display = 'none';
        });

        // PC MOUSE LOOK
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body || cheatConfig.aimbotPressed) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));
        });

        // PC KEYBOARD INPUT
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
            if (e.code === 'Space' && isGrounded) Lompat();
            if (e.code === 'ControlLeft') Jongkok(true);
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
            if (e.code === 'ControlLeft') Jongkok(false);
        });

        // HP MOBILE LOOK (Geser Sisi Kanan Layar)
        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.clientX > window.innerWidth / 2 && touchLookId === null) {
                    // Hindari area tombol menu kiri atas dan tombol hud kanan bawah
                    if(t.clientY < 180 && t.clientX < 220) return; 
                    touchLookId = t.identifier;
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (cheatConfig.aimbotPressed) return;
            for (let i = 0; i < e.touches.length; i++) {
                let t = e.touches[i];
                if (t.identifier === touchLookId) {
                    let diffX = t.clientX - lastTouchX;
                    let diffY = t.clientY - lastTouchY;
                    yaw -= diffX * 0.004;
                    pitch -= diffY * 0.004;
                    pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchLookId) touchLookId = null;
            }
        });

        // HP VIRTUAL ANALOG (Sisi Kiri Layar)
        const joyZone = document.getElementById('joystick-zone');
        const joyStick = document.getElementById('joystick-stick');
        let joyTouchId = null;

        joyZone.addEventListener('touchstart', (e) => { joyTouchId = e.changedTouches[0].identifier; });
        joyZone.addEventListener('touchmove', (e) => {
            if (joyTouchId === null) return;
            let touch = Array.from(e.touches).find(t => t.identifier === joyTouchId);
            if (!touch) return;

            let rect = joyZone.getBoundingClientRect();
            let centerX = rect.left + rect.width / 2;
            let centerY = rect.top + rect.height / 2;

            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            let dist = Math.min(Math.sqrt(deltaX*deltaX + deltaY*deltaY), 40);
            let angle = Math.atan2(deltaY, deltaX);

            joyStick.style.left = (40 + Math.cos(angle) * dist) + 'px';
            joyStick.style.top = (40 + Math.sin(angle) * dist) + 'px';

            moveForward = deltaY < -15;
            moveBackward = deltaY > 15;
            moveLeft = deltaX < -15;
            moveRight = deltaX > 15;
        });
        joyZone.addEventListener('touchend', () => {
            joyTouchId = null; joyStick.style.left = '40px'; joyStick.style.top = '40px';
            moveForward = moveBackward = moveLeft = moveRight = false;
        });

        // HP BUTTONS EVENT LISTENERS
        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => { e.preventDefault(); Tembak(); });
        document.getElementById('btn-scope').addEventListener('touchstart', (e) => { e.preventDefault(); ToggleScope(); });
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(isGrounded) Lompat(); });
        
        let crouchMobileState = false;
        document.getElementById('btn-crouch').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            crouchMobileState = !crouchMobileState;
            Jongkok(crouchMobileState);
        });

        // PC MOUSE CLICK
        document.addEventListener('mousedown', (e) => { 
            if(document.pointerLockElement === document.body) {
                if(e.button === 0) Tembak();
                if(e.button === 2) cheatConfig.aimbotPressed = true;
            }
        });
        document.addEventListener('mouseup', (e) => { if(e.button === 2) cheatConfig.aimbotPressed = false; });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // INITIALIZE GAME WORLD
        init();
        detectDevice();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05050d);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = playerHeight;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            let dLight = new THREE.DirectionalLight(0xffffff, 0.6); dLight.position.set(5, 15, 5); scene.add(dLight);
            
            // Grid Pembatas Map (Neon Pink)
            scene.add(new THREE.GridHelper(100, 40, 0xff0055, 0x222233));

            // Tembok Penghalang
            obstacleWall = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 1), new THREE.MeshStandardMaterial({ color: 0x2c2c38, roughness:0.7 }));
            obstacleWall.position.set(0, 3, -8); scene.add(obstacleWall);

            // Musuh (Target)
            enemy = new THREE.Mesh(new THREE.BoxGeometry(1.6, 3.2, 1.6), new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.3 }));
            RelocateEnemy(); scene.add(enemy);
        }

        function RelocateEnemy() {
            enemy.position.x = (Math.random() - 0.5) * 22;
            enemy.position.z = -Math.random() * 16 - 10;
            enemy.position.y = 1.6;
        }

        function Jongkok(active) {
            isCrouching = active;
            playerHeight = isCrouching ? 1.0 : 2.0;
            document.getElementById('btn-crouch').style.background = isCrouching ? "rgba(0,255,50,0.4)" : "rgba(255,255,255,0.15)";
        }

        function Lompat() { verticalVelocity = 12; isGrounded = false; }

        function ToggleScope() {
            isScoped = !isScoped;
            camera.fov = isScoped ? 32 : 75;
            camera.updateProjectionMatrix();
            document.getElementById('btn-scope').style.background = isScoped ? "rgba(0,255,50,0.4)" : "rgba(255,255,255,0.15)";
        }

        function Tembak() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            // Modifikasi Jika Magic Bullet ON vs OFF
            if (cheatConfig.magicBullet) {
                if (raycaster.intersectObject(enemy).length > 0) HitSuccess();
            } else {
                const hits = raycaster.intersectObjects([obstacleWall, enemy]);
                if (hits.length > 0 && hits[0].object === enemy) HitSuccess();
            }
        }

        function HitSuccess() {
            score++; document.getElementById('score').innerText = score;
            enemy.material.color.setHex(0xff0055); 
            setTimeout(() => { enemy.material.color.setHex(0x00ffff); }, 150);
            RelocateEnemy();
        }

        // MAIN GAME LOOP (60 FPS RENDER ENGINE)
        let lastTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - lastTime) / 1000; lastTime = time;

            // Physics Pergerakan Vertikal (Gravitasi & Lompatan)
            if (!isGrounded) {
                verticalVelocity -= 32 * delta;
                camera.position.y += verticalVelocity * delta;
                if (camera.position.y <= playerHeight) {
                    camera.position.y = playerHeight; verticalVelocity = 0; isGrounded = true;
                }
            } else {
                camera.position.y += (playerHeight - camera.position.y) * 15 * delta; // Smooth transisi jongkok
            }

            // LOGIKA AIMBOT CORE (Locking System)
            // Di HP, jika tombol scope aktif, ia juga otomatis memicu Aimbot untuk kemudahan bermain
            if (cheatConfig.aimbotPressed || (isScoped && 'ontouchstart' in window)) {
                let targetPos = enemy.position.clone();
                if (cheatConfig.aimTarget === "HEAD") targetPos.y += 1.3; // Lock Kepala

                let dirToEnemy = new THREE.Vector3().subVectors(targetPos, camera.position).normalize();
                yaw = Math.atan2(-dirToEnemy.x, -dirToEnemy.z);
                pitch = Math.atan2(dirToEnemy.y, Math.sqrt(dirToEnemy.x * dirToEnemy.x + dirToEnemy.z * dirToEnemy.z));
            }

            // Terapkan Rotasi Kamera
            camera.quaternion.copy(new THREE.Quaternion().setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ')));

            // Kalkulasi Arah Gerak WASD / Analog
            velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;
            direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize().applyEuler(new THREE.Euler(0, yaw, 0, 'YXZ'));

            let speedMultiplier = isCrouching ? 50.0 : (isScoped ? 40.0 : 130.0);
            if (moveForward || moveBackward) velocity.z -= direction.z * speedMultiplier * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * speedMultiplier * delta;
            camera.position.addScaledVector(velocity, delta);

            // Perbarui Indikator Jarak Target di HUD
            let dist = camera.position.distanceTo(enemy.position);
            document.getElementById('distance').innerText = Math.round(dist);

            // LOGIKA VISUALISASI ESP BOX
            const espBox = document.getElementById('esp-box');
            if (cheatConfig.espActive) {
                let tempV = enemy.position.clone(); tempV.project(camera);
                if (tempV.z <= 1) {
                    let x = (tempV.x * .5 + .5) * window.innerWidth; let y = (tempV.y * -.5 + .5) * window.innerHeight;
                    let boxSize = (1 / dist) * 650;
                    espBox.style.display = 'block'; espBox.style.left = (x - boxSize/2) + 'px'; espBox.style.top = (y - boxSize/2) + 'px';
                    espBox.style.width = boxSize + 'px'; espBox.style.height = (boxSize * 1.5) + 'px';
                } else { espBox.style.display = 'none'; }
            } else { espBox.style.display = 'none'; }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
